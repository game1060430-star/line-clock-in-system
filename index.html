<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>LINE GPS 打卡系統</title>
  <style>
    :root {
      --bg: #f5f7f4;
      --panel: #ffffff;
      --text: #17211b;
      --muted: #66736c;
      --line: #dfe6df;
      --primary: #06c755;
      --primary-dark: #049544;
      --blue: #246f9f;
      --amber: #ad6a21;
      --red: #c44545;
      --soft-green: #e7f8ed;
      --soft-amber: #fff1df;
      --soft-red: #fdeaea;
      --soft-gray: #eef2ef;
      --shadow: 0 8px 22px rgba(22, 33, 27, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow-x: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select, textarea { font: inherit; max-width: 100%; min-width: 0; }
    button { cursor: pointer; }
    .app { width: min(980px, 100%); margin: 0 auto; padding: 12px 12px 92px; }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .brand { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(6, 199, 85, 0.22);
      flex: 0 0 auto;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin: 0 0 2px; font-size: 21px; line-height: 1.2; }
    .subtitle { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .profile {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      gap: 9px;
      align-items: center;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #dcece3;
      color: var(--primary-dark);
      display: grid;
      place-items: center;
      font-weight: 900;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile strong, .profile span { display: block; white-space: nowrap; }
    .profile strong { font-size: 14px; }
    .profile span { color: var(--muted); font-size: 12px; }
    .hero {
      background: linear-gradient(120deg, #06c755, #246f9f);
      color: #fff;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .hero h2 { margin-bottom: 5px; font-size: 22px; }
    .hero p { margin-bottom: 0; font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.9); }
    .nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 40;
      width: min(980px, 100%);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(245, 247, 244, 0.96);
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 24px rgba(23, 33, 27, 0.08);
      backdrop-filter: blur(10px);
    }
    .tab {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font-weight: 900;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .panel h3 { margin-bottom: 11px; font-size: 17px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .span-2 { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 12px; font-weight: 900; }
    input, select, textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fbfcfb;
      color: var(--text);
    }
    input[type="date"], input[type="month"], input[type="time"] {
      appearance: none;
      -webkit-appearance: none;
      font-size: 16px;
    }
    textarea { min-height: 74px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: 3px solid rgba(6, 199, 85, 0.18);
      border-color: var(--primary);
      background: #fff;
    }
    .btn {
      border: 0;
      min-height: 46px;
      border-radius: 8px;
      color: #fff;
      font-weight: 900;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
    }
    .btn.primary { background: var(--primary); }
    .btn.blue { background: var(--blue); }
    .btn.amber { background: var(--amber); }
    .btn.red { background: var(--red); }
    .btn.ghost { background: var(--soft-gray); color: var(--text); border: 1px solid var(--line); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .clock-face {
      display: grid;
      place-items: center;
      min-height: 138px;
      background: #eef7f1;
      border: 1px solid #d6eadc;
      border-radius: 8px;
      text-align: center;
      padding: 14px;
    }
    .time-now { font-size: clamp(38px, 10vw, 64px); line-height: 1; font-weight: 900; }
    .date-now { color: var(--muted); margin-top: 8px; font-size: 14px; }
    .hint {
      border-left: 4px solid var(--primary);
      background: #f0f8f3;
      border-radius: 8px;
      padding: 10px 12px;
      color: #29543b;
      font-size: 14px;
      line-height: 1.55;
    }
    .hint.warn { border-left-color: var(--amber); background: var(--soft-amber); color: #754514; }
    .hint.bad { border-left-color: var(--red); background: var(--soft-red); color: #8f2929; }
    .summary-number {
      border-radius: 8px;
      background: var(--soft-green);
      border: 1px solid #9bddb5;
      padding: 20px 12px;
      text-align: center;
    }
    .summary-number span { display: block; color: var(--muted); font-size: 13px; font-weight: 900; }
    .summary-number b { display: block; margin-top: 8px; font-size: clamp(36px, 12vw, 72px); color: var(--primary-dark); }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      padding: 10px;
      min-height: 74px;
    }
    .stat span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .stat b { display: block; margin-top: 6px; font-size: 21px; }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 5px 8px;
      background: var(--soft-gray);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .badge.ok { background: var(--soft-green); color: var(--primary-dark); }
    .badge.warn { background: var(--soft-amber); color: var(--amber); }
    .badge.bad { background: var(--soft-red); color: var(--red); }
    .badge.off { background: #e0e7ff; color: #3730a3; }
    .dashboard-list { display: grid; gap: 8px; }
    .dashboard-row {
      border: 1px solid var(--line);
      border-left: 6px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .dashboard-row.working { border-left-color: var(--amber); background: #fffbeb; }
    .dashboard-row.done { border-left-color: #3730a3; background: #eef2ff; }
    .dashboard-row.absent { border-left-color: #94a3b8; background: #f8fafc; color: #64748b; }
    .dashboard-times {
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .list { display: grid; gap: 8px; }
    .row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .row small { color: var(--muted); line-height: 1.55; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 780px; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; text-align: left; vertical-align: top; }
    th { background: #f0f5f1; color: var(--muted); font-size: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      color: var(--muted);
      background: #fbfcfb;
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(23, 33, 27, 0.52);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .modal-box {
      width: min(360px, 100%);
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(23, 33, 27, 0.22);
      padding: 18px;
      text-align: center;
    }
    .modal-box h3 { margin-bottom: 8px; }
    .modal-box p { margin-bottom: 14px; color: var(--muted); line-height: 1.55; }
    .spinner {
      width: 42px;
      height: 42px;
      border: 5px solid #dcece3;
      border-top-color: var(--primary);
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.9s linear infinite;
    }
    .modal-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 12px;
      color: #fff;
      background: var(--primary);
      font-weight: 900;
      font-size: 24px;
    }
    .modal-icon.bad { background: var(--red); }
    .quick-punch-box { text-align: left; }
    .quick-punch-box h3 { text-align: center; }
    .quick-punch-grid { display: grid; gap: 8px; margin: 12px 0; }
    .quick-punch-line {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fbfcfb;
    }
    .quick-punch-line span { display: block; color: var(--muted); font-size: 12px; font-weight: 900; }
    .quick-punch-line b { display: block; margin-top: 3px; font-size: 17px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    @media (max-width: 760px) {
      .app { padding: 8px 8px 128px; }
      .topbar { grid-template-columns: 1fr; }
      .profile { width: 100%; }
      .profile strong, .profile span { white-space: normal; }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); padding-left: 8px; padding-right: 8px; }
      .grid, .grid-3 { grid-template-columns: 1fr; }
      .panel { padding: 10px; }
      .table-wrap { overflow-x: visible; }
      table { min-width: 0; border-collapse: separate; border-spacing: 0 8px; }
      thead { display: none; }
      tbody, tr, td { display: block; width: 100%; }
      tr { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 8px; }
      td { border-bottom: 0; padding: 6px 0; display: grid; grid-template-columns: 88px minmax(0, 1fr); gap: 8px; }
      td::before { color: var(--muted); font-size: 12px; font-weight: 900; }
      td:nth-child(1)::before { content: "日期"; }
      td:nth-child(2)::before { content: "員工"; }
      td:nth-child(3)::before { content: "類型"; }
      td:nth-child(4)::before { content: "實際"; }
      td:nth-child(5)::before { content: "修正"; }
      td:nth-child(6)::before { content: "狀態"; }
      td:nth-child(7)::before { content: "備註"; }
      td:nth-child(8)::before { content: "操作"; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">LINE</div>
        <div>
          <h1>LINE GPS 打卡系統</h1>
          <p class="subtitle hidden"></p>
        </div>
      </div>
      <div class="profile">
        <div id="avatar" class="avatar">員</div>
        <div>
          <strong id="profileName">讀取中</strong>
          <span id="profileStatus">準備連線</span>
        </div>
      </div>
    </header>

    <section class="hero">
      <h2 id="heroTitle">GPS 打卡</h2>
      <p id="heroText" class="hidden"></p>
    </section>

    <nav class="nav" aria-label="主功能">
      <button class="tab active" data-page="punch" data-punch-type="上班">上班打卡</button>
      <button class="tab" data-page="punch" data-punch-type="下班">下班打卡</button>
      <button class="tab" data-page="query">工時查詢</button>
      <button class="tab" data-page="admin">管理</button>
    </nav>

    <main>
      <section id="page-punch" class="page">
        <div class="panel">
          <h3 id="punchTitle">上班打卡</h3>
          <div class="grid">
            <button id="confirmPunchBtn" class="btn primary span-2" type="button" disabled>確認打卡</button>
            <div class="clock-face span-2">
              <div>
                <div id="timeNow" class="time-now">--:--:--</div>
                <div id="dateNow" class="date-now">讀取日期</div>
              </div>
            </div>
            <div id="employeeBindWrap" class="hidden span-2">
              <label for="employeeSelect">選擇你的員工身分</label>
              <select id="employeeSelect"></select>
              <button id="bindEmployeeBtn" class="btn blue" type="button" style="margin-top:8px;">綁定目前 LINE 到這位員工</button>
            </div>
            <div>
              <label>打卡類型</label>
              <div id="punchTypeLabel" class="hint">上班</div>
            </div>
            <div class="span-2">
              <div id="gpsStatus" class="hint warn">GPS 定位中...</div>
            </div>
            <div class="span-2">
              <label for="punchNote">備註</label>
              <textarea id="punchNote" placeholder="特殊狀況再填，例如定位飄移。"></textarea>
            </div>
          </div>
        </div>
      </section>

      <section id="page-query" class="page hidden">
        <div class="panel">
          <h3>當月總工時</h3>
          <div id="queryIdentity" class="hint hidden" style="margin-bottom:10px;"></div>
          <div class="summary-number">
            <span id="summaryMonth">本月累計總工時</span>
            <b id="summaryHours">--</b>
          </div>
          <div class="grid" style="margin-top:10px;">
            <button id="refreshSummaryBtn" class="btn blue" type="button">重新整理</button>
            <button id="openRequestBtn" class="btn amber" type="button">申請補卡 / 漏打卡回報</button>
          </div>
        </div>

        <div id="requestPanel" class="panel hidden">
          <h3>補卡 / 漏打卡回報</h3>
          <div class="grid">
            <div>
              <label for="requestDate">日期</label>
              <input id="requestDate" type="date">
            </div>
            <div>
              <label for="requestType">類型</label>
              <select id="requestType">
                <option value="上班">上班</option>
                <option value="下班">下班</option>
              </select>
            </div>
            <div>
              <label for="requestTime">員工自述時間</label>
              <input id="requestTime" type="time" value="06:30">
            </div>
            <div class="span-2">
              <label for="requestReason">原因備註</label>
              <textarea id="requestReason" placeholder="例如忘記打卡、手機沒電。"></textarea>
            </div>
            <button id="submitRequestBtn" class="btn primary span-2" type="button">送出申請</button>
          </div>
        </div>
      </section>

      <section id="page-admin" class="page hidden">
        <div id="adminLock" class="panel">
          <h3>管理者登入</h3>
          <div class="grid">
            <div>
              <label for="adminPinLogin">管理 PIN</label>
              <input id="adminPinLogin" type="password" inputmode="numeric" placeholder="輸入管理 PIN">
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="unlockAdminBtn" class="btn blue" type="button">解鎖管理功能</button>
            </div>
          </div>
        </div>

        <div id="adminArea" class="hidden">
          <div class="panel">
            <h3>今日即時儀表板</h3>
            <div class="grid-3" style="margin-bottom:10px;">
              <div class="stat"><span>已上班</span><b id="todayClockInCount">0</b></div>
              <div class="stat"><span>上班中</span><b id="todayWorkingCount">0</b></div>
              <div class="stat"><span>未上班</span><b id="todayAbsentCount">0</b></div>
            </div>
            <div id="todayDashboard" class="dashboard-list"></div>
          </div>

          <div class="panel">
            <h3>系統設定</h3>
            <div class="grid">
              <div>
                <label for="siteNameInput">店名</label>
                <input id="siteNameInput" type="text">
              </div>
              <div>
                <label for="radiusInput">允許半徑（公尺）</label>
                <input id="radiusInput" type="number" min="10" value="100">
              </div>
              <div>
                <label for="latInput">中心點緯度</label>
                <input id="latInput" type="number" step="0.000001">
              </div>
              <div>
                <label for="lngInput">中心點經度</label>
                <input id="lngInput" type="number" step="0.000001">
              </div>
              <div>
                <label for="adminPinInput">管理 PIN</label>
                <input id="adminPinInput" type="password" inputmode="numeric">
              </div>
              <div>
                <label for="liffIdInput">LIFF ID</label>
                <input id="liffIdInput" type="text">
              </div>
              <div class="span-2">
                <label for="apiUrlInput">Google Apps Script API URL</label>
                <input id="apiUrlInput" type="url">
              </div>
              <button id="useCurrentLocationBtn" class="btn ghost" type="button">用目前定位設為店址</button>
              <button id="saveSettingsBtn" class="btn primary" type="button">儲存設定</button>
            </div>
          </div>

          <div class="panel">
            <h3>員工名單</h3>
            <div class="grid">
              <div>
                <label for="employeeLineIdInput">LINE ID</label>
                <input id="employeeLineIdInput" type="text" placeholder="LINE User ID">
              </div>
              <div>
                <label for="employeeNameInput">員工姓名</label>
                <input id="employeeNameInput" type="text" placeholder="員工姓名">
              </div>
              <div class="span-2">
                <label for="employeeRoleInput">權限</label>
                <select id="employeeRoleInput">
                  <option value="員工">員工</option>
                  <option value="管理者">管理者</option>
                </select>
              </div>
              <button id="saveEmployeeBtn" class="btn primary span-2" type="button">儲存員工</button>
            </div>
            <div id="employeeList" class="list" style="margin-top:10px;"></div>
          </div>

          <div class="panel">
            <h3>補卡申請審核</h3>
            <div id="requestReviewList" class="list"></div>
          </div>

          <div class="panel">
            <h3>管理者直接補打卡</h3>
            <div class="grid">
              <div>
                <label for="manualEmployeeSelect">員工</label>
                <select id="manualEmployeeSelect"></select>
              </div>
              <div>
                <label for="manualDate">日期</label>
                <input id="manualDate" type="date">
              </div>
              <div>
                <label for="manualType">類型</label>
                <select id="manualType">
                  <option value="上班">上班</option>
                  <option value="下班">下班</option>
                </select>
              </div>
              <div>
                <label for="manualTime">時間</label>
                <input id="manualTime" type="time" value="06:30">
              </div>
              <div class="span-2">
                <label for="manualNote">備註</label>
                <textarea id="manualNote" placeholder="例如忘記打卡、老闆補登。"></textarea>
              </div>
              <button id="manualClockBtn" class="btn amber span-2" type="button">新增補打卡</button>
            </div>
          </div>

          <div class="panel">
            <h3>打卡紀錄</h3>
            <div class="grid" style="margin-bottom:10px;">
              <div>
                <label for="logMonthInput">月份</label>
                <input id="logMonthInput" type="month">
              </div>
              <div>
                <label for="logDateInput">日期</label>
                <input id="logDateInput" type="date">
              </div>
              <div>
                <label>&nbsp;</label>
                <button id="refreshAdminBtn" class="btn blue" type="button">重新同步</button>
              </div>
              <div>
                <label>&nbsp;</label>
                <button id="clearLogDateBtn" class="btn ghost" type="button">看整月</button>
              </div>
            </div>
            <div class="grid-3" style="margin-bottom:10px;">
              <div class="stat"><span>本月員工數</span><b id="adminEmployeeCount">0</b></div>
              <div class="stat"><span>本月打卡筆數</span><b id="adminLogCount">0</b></div>
              <div class="stat"><span>待審核</span><b id="adminPendingCount">0</b></div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>日期</th><th>員工</th><th>類型</th><th>實際</th><th>修正</th><th>狀態</th><th>備註</th><th>操作</th></tr>
                </thead>
                <tbody id="logTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="statusModal" class="modal hidden" role="dialog" aria-live="assertive" aria-modal="true">
    <div class="modal-box">
      <div id="statusSpinner" class="spinner"></div>
      <div id="statusIcon" class="modal-icon hidden">✓</div>
      <h3 id="statusTitle">處理中</h3>
      <p id="statusText">正在送出打卡資料...</p>
      <button id="statusCloseBtn" class="btn ghost hidden" type="button">我知道了</button>
    </div>
  </div>

  <div id="quickPunchModal" class="modal hidden" role="dialog" aria-live="assertive" aria-modal="true">
    <div class="modal-box quick-punch-box">
      <h3 id="quickPunchTitle">上班打卡</h3>
      <div class="quick-punch-grid">
        <div class="quick-punch-line">
          <span>員工</span>
          <b id="quickEmployeeName">讀取中</b>
        </div>
        <div class="quick-punch-line">
          <span>目前時間</span>
          <b id="quickTimeNow">--:--:--</b>
        </div>
        <div class="quick-punch-line">
          <span>定位</span>
          <b id="quickGpsStatus">定位中...</b>
        </div>
      </div>
      <button id="quickConfirmPunchBtn" class="btn primary" type="button" disabled style="width:100%;">確認打卡</button>
      <button id="quickCloseBtn" class="btn ghost" type="button" style="width:100%; margin-top:8px;">取消</button>
    </div>
  </div>

  <script>
    const STORE_KEY = "line-gps-clock-v1";
    const DATA_STORE_KEY = "line-gps-clock-data-v1";
    const DEFAULT_SETTINGS = {
      apiUrl: "https://script.google.com/macros/s/AKfycbwDDO0NF5msB2B3KBDvMkPpGN1EDD2hz8cEvKZGxrgOm_QECebVkUlHxnmo6D9_FsTx0w/exec",
      liffId: "2009988841-I1LdubR2",
      siteName: "店面",
      latitude: 25.033964,
      longitude: 121.564468,
      radiusMeters: 100,
      adminPin: "1234"
    };

    let settings = loadSettings();
    const cachedData = loadCachedData();
    let employees = cachedData.employees;
    let logs = cachedData.logs;
    let requests = cachedData.requests;
    let summaries = cachedData.summaries;
    let currentProfile = { userId: "", displayName: "訪客", pictureUrl: "" };
    let adminUnlocked = false;
    let punchType = "上班";
    let currentPosition = null;
    let currentDistance = null;
    let gpsInRange = false;
    let punchSubmitting = false;
    let quickPunchRequested = false;

    const $ = id => document.getElementById(id);
    const pad = value => String(value).padStart(2, "0");

    function loadSettings() {
      try {
        return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem(STORE_KEY)) || {});
      } catch {
        return Object.assign({}, DEFAULT_SETTINGS);
      }
    }

    function saveLocalSettings() {
      localStorage.setItem(STORE_KEY, JSON.stringify(settings));
    }

    function loadCachedData() {
      try {
        const saved = JSON.parse(localStorage.getItem(DATA_STORE_KEY)) || {};
        return {
          employees: (saved.employees || []).map(normalizeEmployee),
          logs: (saved.logs || []).map(normalizeLog),
          requests: (saved.requests || []).map(normalizeRequest),
          summaries: saved.summaries || []
        };
      } catch {
        return { employees: [], logs: [], requests: [], summaries: [] };
      }
    }

    function saveCachedData() {
      localStorage.setItem(DATA_STORE_KEY, JSON.stringify({ employees, logs, requests, summaries }));
    }

    function nowParts() {
      const now = new Date();
      const date = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
      const month = date.slice(0, 7);
      const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      return { now, date, month, time };
    }

    function updateClock() {
      const parts = nowParts();
      $("timeNow").textContent = parts.time;
      if ($("quickTimeNow")) $("quickTimeNow").textContent = parts.time;
      $("dateNow").textContent = parts.now.toLocaleDateString("zh-TW", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    }

    function roundToNearestHalfHour(timeText) {
      const [h, m] = String(timeText || "00:00").split(":").map(Number);
      const minutes = (h || 0) * 60 + (m || 0);
      const rounded = Math.floor((minutes + 14) / 30) * 30;
      return timeFromMinutes(rounded);
    }

    function timeFromMinutes(minutes) {
      const normalized = ((minutes % 1440) + 1440) % 1440;
      return `${pad(Math.floor(normalized / 60))}:${pad(normalized % 60)}`;
    }

    function isLineClient() {
      return /Line\//i.test(navigator.userAgent || "");
    }

    function loadLiffSdk() {
      if (window.liff) return Promise.resolve(window.liff);
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://static.line-scdn.net/liff/edge/2/sdk.js";
        script.charset = "utf-8";
        script.onload = () => resolve(window.liff);
        script.onerror = () => reject(new Error("LIFF SDK 載入失敗"));
        document.head.appendChild(script);
      });
    }

    async function initLineProfile() {
      if (!settings.liffId || !isLineClient()) {
        renderProfile("瀏覽器模式");
        return;
      }
      try {
        await loadLiffSdk();
        await liff.init({ liffId: settings.liffId });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        currentProfile = {
          userId: profile.userId,
          displayName: profile.displayName || "LINE 使用者",
          pictureUrl: profile.pictureUrl || ""
        };
        renderProfile("已連線 LINE");
      } catch (error) {
        console.warn(error);
        renderProfile("LIFF 讀取失敗");
      }
    }

    function renderProfile(status) {
      $("profileName").textContent = currentProfile.displayName || "訪客";
      $("profileStatus").textContent = status;
      if (currentProfile.pictureUrl) {
        $("avatar").innerHTML = `<img src="${escapeHtml(currentProfile.pictureUrl)}" alt="">`;
      } else {
        $("avatar").textContent = (currentProfile.displayName || "員").slice(0, 1);
      }
    }

    async function apiCall(action, payload = {}) {
      if (!settings.apiUrl) throw new Error("尚未設定 GAS API URL");
      const response = await fetch(settings.apiUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, payload })
      });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || "API request failed");
      return data.payload;
    }

    async function syncFromSheet() {
      try {
        const data = await apiCall("getBootstrap");
        settings = Object.assign({}, settings, normalizeSettings(data.settings || {}));
        saveLocalSettings();
        employees = (data.employees || []).map(normalizeEmployee);
        logs = (data.logs || []).map(normalizeLog);
        requests = (data.requests || []).map(normalizeRequest);
        summaries = data.summaries || [];
        saveCachedData();
        renderAll();
      } catch (error) {
        console.warn(error);
        $("profileStatus").textContent = `同步失敗：${error.message}`;
      }
    }

    function normalizeSettings(data) {
      return {
        siteName: data.siteName || settings.siteName,
        latitude: Number(data.latitude || settings.latitude),
        longitude: Number(data.longitude || settings.longitude),
        radiusMeters: Number(data.radiusMeters || settings.radiusMeters || 100),
        adminPin: data.adminPin || settings.adminPin
      };
    }

    function normalizeEmployee(row) {
      return {
        lineUserId: row["LINE ID"] || row.lineUserId || "",
        name: row["員工姓名"] || row.name || "",
        status: row["狀態(啟用/停用)"] || row.status || "啟用",
        role: row["權限(員工/管理者)"] || row.role || "員工"
      };
    }

    function normalizeLog(row) {
      return {
        lineUserId: row["LINE ID"] || "",
        name: row["員工姓名"] || "",
        date: toDateText(row["日期"]),
        actualTime: toTimeText(row["實際打卡時間"]),
        roundedTime: toTimeText(row["系統修正時間(30分單位)"]),
        type: row["打卡類型(上班/下班)"] || "",
        note: row["備註/來源(正常打卡/管理者補卡)"] || "",
        logId: row["紀錄ID"] || "",
        status: row["狀態(納入/取消)"] || "納入"
      };
    }

    function activeLogsFor(lineUserId, dateOrMonth) {
      return logs.filter(log =>
        log.lineUserId === lineUserId &&
        log.status !== "取消" &&
        String(log.date || "").startsWith(dateOrMonth)
      );
    }

    function hasActiveClock(lineUserId, date, type) {
      return activeLogsFor(lineUserId, date).some(log => log.type === type);
    }

    function canConfirmQuickPunch() {
      return Boolean(currentPosition && (!quickPunchRequested || currentLineEmployee()) && !punchSubmitting);
    }

    function minutesFromTime(timeText) {
      const match = String(timeText || "").match(/^(\d{1,2}):(\d{2})/);
      if (!match) return 0;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function calculateLocalSummary(lineUserId, month) {
      const byDate = {};
      activeLogsFor(lineUserId, month).forEach(log => {
        if (!byDate[log.date]) byDate[log.date] = [];
        byDate[log.date].push(log);
      });
      let totalHours = 0;
      Object.values(byDate).forEach(dayLogs => {
        const records = dayLogs
          .map(log => ({ type: log.type, minutes: minutesFromTime(log.roundedTime || log.actualTime) }))
          .filter(log => log.type === "上班" || log.type === "下班")
          .sort((a, b) => a.minutes - b.minutes);
        let openStart = null;
        let dayMinutes = 0;
        records.forEach(record => {
          if (record.type === "上班") {
            openStart = record.minutes;
            return;
          }
          if (record.type === "下班" && openStart !== null && record.minutes > openStart) {
            dayMinutes += record.minutes - openStart;
            openStart = null;
          }
        });
        totalHours += dayMinutes / 60;
      });
      return { month, totalHours: Math.round(totalHours * 10) / 10 };
    }

    function upsertLocalClock(payload) {
      const log = normalizeLog(payload);
      if (log.logId) logs = logs.filter(item => item.logId !== log.logId);
      logs.unshift(log);
      const month = String(log.date || "").slice(0, 7);
      const monthlySummary = calculateLocalSummary(log.lineUserId, month);
      summaries = summaries.filter(item => !(item.lineUserId === log.lineUserId && item.month === month));
      summaries.push(Object.assign({ lineUserId: log.lineUserId, month }, monthlySummary));
      saveCachedData();
      renderAll();
    }

    function normalizeRequest(row) {
      return {
        requestId: row["申請ID"] || "",
        lineUserId: row["LINE ID"] || "",
        name: row["員工姓名"] || "",
        date: toDateText(row["日期"]),
        type: row["類型(上班/下班)"] || "",
        claimedTime: toTimeText(row["員工自述時間"]),
        reason: row["原因備註"] || "",
        status: row["狀態(待審核/已核准/已拒絕)"] || "待審核"
      };
    }

    function toDateText(value) {
      if (!value) return "";
      const text = String(value);
      const match = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (match) return `${match[1]}-${match[2]}-${match[3]}`;
      const parsed = new Date(text);
      if (!Number.isNaN(parsed.getTime())) return `${parsed.getFullYear()}-${pad(parsed.getMonth() + 1)}-${pad(parsed.getDate())}`;
      return text;
    }

    function toTimeText(value) {
      if (!value) return "";
      const text = String(value);
      const plain = text.match(/^(\d{1,2}):(\d{2})/);
      if (plain) return `${pad(Number(plain[1]))}:${plain[2]}`;
      const iso = text.match(/T(\d{2}):(\d{2})/);
      if (iso) return `${iso[1]}:${iso[2]}`;
      return text;
    }

    function selectedEmployee() {
      if (currentProfile.userId) {
        const matched = employees.find(employee => employee.lineUserId === currentProfile.userId);
        if (matched) return matched;
      }
      const selectedIndex = Number($("employeeSelect").value || 0);
      const selected = employees[selectedIndex] || employees[0];
      if (!selected) return { lineUserId: currentProfile.userId || "", name: currentProfile.displayName || "測試員工", status: "啟用" };
      if (currentProfile.userId && !selected.lineUserId) return Object.assign({}, selected, { lineUserId: currentProfile.userId });
      return selected;
    }

    function currentLineEmployee() {
      if (!currentProfile.userId) return null;
      return employees.find(employee => employee.lineUserId === currentProfile.userId) || null;
    }

    function effectiveRole(employee) {
      if (!employee) return "員工";
      if (employee.role === "管理者") return "管理者";
      if (["店長", "管理者", "老闆"].includes(String(employee.name || "").trim())) return "管理者";
      return "員工";
    }

    function isCurrentUserAdmin() {
      return effectiveRole(currentLineEmployee()) === "管理者";
    }

    function renderEmployeeSelect() {
      const wrap = $("employeeBindWrap");
      const matched = currentProfile.userId && employees.some(employee => employee.lineUserId === currentProfile.userId);
      wrap.classList.toggle("hidden", Boolean(currentProfile.userId && matched));
      const current = $("employeeSelect").value;
      $("employeeSelect").innerHTML = employees.length
        ? employees.map((employee, index) => `<option value="${index}">${escapeHtml(employee.name || "(未命名)")}${employee.lineUserId ? "（已綁定）" : ""}</option>`).join("")
        : `<option value="">測試員工</option>`;
      if (current && Number(current) < employees.length) $("employeeSelect").value = current;
      $("bindEmployeeBtn").classList.toggle("hidden", !currentProfile.userId || Boolean(matched));
    }

    async function bindSelectedEmployee() {
      if (!currentProfile.userId) return alert("請從 LINE 內開啟後再綁定。");
      const index = Number($("employeeSelect").value || 0);
      const employee = employees[index];
      if (!employee) return alert("請先選擇員工。");
      if (employee.lineUserId && employee.lineUserId !== currentProfile.userId && !confirm("這位員工已綁定其他 LINE ID，確定改綁目前 LINE？")) return;
      try {
        await apiCall("saveEmployee", { lineUserId: currentProfile.userId, name: employee.name, status: "啟用" });
        await syncFromSheet();
        alert(`已綁定 ${employee.name}`);
      } catch (error) {
        alert(`綁定失敗：${error.message}`);
      }
    }

    async function locate() {
      $("gpsStatus").className = "hint warn";
      $("gpsStatus").textContent = "GPS 定位中...";
      $("confirmPunchBtn").disabled = true;
      $("quickGpsStatus").textContent = "定位中...";
      $("quickConfirmPunchBtn").disabled = true;
      if (!navigator.geolocation) {
        $("gpsStatus").className = "hint bad";
        $("gpsStatus").textContent = "手機不支援 GPS 定位。";
        $("quickGpsStatus").textContent = "手機不支援 GPS";
        return;
      }
      navigator.geolocation.getCurrentPosition(position => {
        currentPosition = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        };
        currentDistance = distanceMeters(currentPosition.latitude, currentPosition.longitude, Number(settings.latitude), Number(settings.longitude));
        gpsInRange = currentDistance <= Number(settings.radiusMeters || 100);
        if (gpsInRange) {
          $("gpsStatus").className = "hint";
          $("gpsStatus").textContent = `範圍內｜${Math.round(currentDistance)} 公尺`;
          $("confirmPunchBtn").disabled = false;
          $("quickGpsStatus").textContent = `範圍內｜${Math.round(currentDistance)} 公尺`;
          $("quickConfirmPunchBtn").disabled = !canConfirmQuickPunch();
        } else {
          $("gpsStatus").className = "hint bad";
          $("gpsStatus").textContent = `範圍外｜${Math.round(currentDistance)} 公尺`;
          $("confirmPunchBtn").disabled = false;
          $("quickGpsStatus").textContent = `範圍外｜${Math.round(currentDistance)} 公尺`;
          $("quickConfirmPunchBtn").disabled = !canConfirmQuickPunch();
        }
      }, error => {
        $("gpsStatus").className = "hint bad";
        $("gpsStatus").textContent = `定位失敗：${error.message || "請允許 LINE 使用定位權限"}`;
        $("quickGpsStatus").textContent = "定位失敗";
        $("confirmPunchBtn").disabled = true;
        $("quickConfirmPunchBtn").disabled = true;
      }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
    }

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const rad = value => value * Math.PI / 180;
      const earth = 6371000;
      const dLat = rad(lat2 - lat1);
      const dLon = rad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(rad(lat1)) * Math.cos(rad(lat2)) * Math.sin(dLon / 2) ** 2;
      return earth * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function showStatusModal(title, text, state = "loading") {
      $("statusTitle").textContent = title;
      $("statusText").textContent = text;
      $("statusModal").classList.remove("hidden");
      $("statusSpinner").classList.toggle("hidden", state !== "loading");
      $("statusIcon").classList.toggle("hidden", state === "loading");
      $("statusIcon").classList.toggle("bad", state === "error");
      $("statusIcon").textContent = state === "error" ? "!" : "✓";
      $("statusCloseBtn").classList.toggle("hidden", state === "loading");
    }

    function hideStatusModal() {
      $("statusModal").classList.add("hidden");
    }

    function openQuickPunchModal() {
      const employee = currentLineEmployee();
      $("quickPunchTitle").textContent = `${punchType}打卡`;
      $("quickEmployeeName").textContent = employee?.name || (currentProfile.userId ? "讀取員工資料中" : "讀取 LINE 身分中");
      $("quickTimeNow").textContent = nowParts().time;
      $("quickGpsStatus").textContent = currentPosition
        ? `${gpsInRange ? "範圍內" : "範圍外"}｜${Math.round(currentDistance)} 公尺`
        : "定位中...";
      $("quickConfirmPunchBtn").disabled = !canConfirmQuickPunch();
      $("quickPunchModal").classList.remove("hidden");
    }

    function closeQuickPunchModal() {
      $("quickPunchModal").classList.add("hidden");
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function nextPaint() {
      return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    async function confirmPunch() {
      if (punchSubmitting) return;
      if (!currentPosition) return alert("尚未取得 GPS 定位。");
      const employee = quickPunchRequested ? currentLineEmployee() : selectedEmployee();
      if (!employee) return alert("尚未確認員工身分，請稍候再試。");
      const actualTime = nowParts().time.slice(0, 5);
      const date = nowParts().date;
      if (hasActiveClock(employee.lineUserId, date, punchType)) {
        return alert(`今天已經有${punchType}打卡紀錄，請不要重複打卡。如需調整時間，請聯絡管理者修改。`);
      }
      const missingClockIn = punchType === "下班" && !hasActiveClock(employee.lineUserId, date, "上班");
      if (missingClockIn && !confirm("今天尚未有上班打卡紀錄。仍要送出下班卡嗎？送出後請記得申請補上班卡，工時才會計算。")) return;
      punchSubmitting = true;
      $("confirmPunchBtn").disabled = true;
      $("quickConfirmPunchBtn").disabled = true;
      $("confirmPunchBtn").textContent = "送出中...";
      $("quickConfirmPunchBtn").textContent = "送出中...";
      closeQuickPunchModal();
      showStatusModal("正在送出打卡", "已收到你的點擊，正在寫入 Google Sheet。", "loading");
      await nextPaint();
      const matched = currentProfile.userId && employees.some(item => item.lineUserId === currentProfile.userId);
      if (currentProfile.userId && !matched) {
        await apiCall("saveEmployee", { lineUserId: currentProfile.userId, name: employee.name, status: "啟用" });
      }
      const payload = {
        lineUserId: employee.lineUserId,
        employeeName: employee.name,
        displayName: currentProfile.displayName,
        date,
        type: punchType,
        actualTime,
        latitude: currentPosition.latitude,
        longitude: currentPosition.longitude,
        distance: Math.round(currentDistance),
        locationStatus: gpsInRange ? "範圍內" : "範圍外",
        note: [$("punchNote").value.trim(), gpsInRange ? "" : `範圍外打卡，距離 ${Math.round(currentDistance)} 公尺`].filter(Boolean).join("；")
      };
      $("confirmPunchBtn").textContent = "寫入中...";
      try {
        const result = await apiCall("clock", payload);
        upsertLocalClock(result);
        if (missingClockIn) {
          showStatusModal("下班打卡已送出", `今天沒有上班卡，請到工時查詢申請補上班卡。這一天會等補卡核准後才計算工時。`, "error");
        } else {
          showStatusModal("打卡完成", `${punchType}打卡完成，實際 ${actualTime}，系統歸入 ${roundToNearestHalfHour(actualTime)}。`, "success");
        }
        syncFromSheet();
        if (!missingClockIn && window.liff && liff.isInClient()) {
          await delay(1200);
          liff.closeWindow();
        }
      } catch (error) {
        showStatusModal("打卡失敗", error.message, "error");
      } finally {
        punchSubmitting = false;
        $("confirmPunchBtn").textContent = "確認打卡";
        $("quickConfirmPunchBtn").textContent = "確認打卡";
        if (currentPosition) $("confirmPunchBtn").disabled = false;
        $("quickConfirmPunchBtn").disabled = !canConfirmQuickPunch();
      }
    }

    async function refreshSummary() {
      const employee = selectedEmployee();
      $("queryIdentity").classList.add("hidden");
      $("queryIdentity").textContent = "";
      const month = nowParts().month;
      $("summaryMonth").textContent = `${month.replace("-", " 年 ")} 月累計總工時`;
      const cached = calculateLocalSummary(employee.lineUserId, month);
      $("summaryHours").textContent = `${Number(cached?.totalHours || 0).toFixed(1)} 小時`;
      if (!employee.lineUserId) return;
      try {
        const summary = await apiCall("getMonthlySummary", { lineUserId: employee.lineUserId, month });
        summaries = summaries.filter(item => !(item.lineUserId === employee.lineUserId && item.month === month));
        summaries.push(Object.assign({ lineUserId: employee.lineUserId, month }, summary));
        saveCachedData();
        $("summaryHours").textContent = `${Number(calculateLocalSummary(employee.lineUserId, month)?.totalHours || summary?.totalHours || 0).toFixed(1)} 小時`;
      } catch (error) {
        $("queryIdentity").classList.remove("hidden");
        $("queryIdentity").textContent = `已先顯示快取資料，同步失敗：${error.message}`;
      }
    }

    function findSummary(lineUserId, month) {
      return summaries.find(summary => summary.lineUserId === lineUserId && summary.month === month) || { totalHours: 0 };
    }

    async function submitCorrectionRequest() {
      const employee = selectedEmployee();
      const payload = {
        requestId: `REQ-${Date.now()}`,
        lineUserId: employee.lineUserId,
        employeeName: employee.name,
        date: $("requestDate").value,
        type: $("requestType").value,
        claimedTime: $("requestTime").value,
        reason: $("requestReason").value.trim()
      };
      if (!payload.date || !payload.claimedTime) return alert("請填日期與時間。");
      try {
        await apiCall("saveCorrectionRequest", payload);
        $("requestReason").value = "";
        $("requestPanel").classList.add("hidden");
        await syncFromSheet();
        alert("補卡申請已送出，等待管理者審核。");
      } catch (error) {
        alert(`送出失敗：${error.message}`);
      }
    }

    function unlockAdmin() {
      if ($("adminPinLogin").value !== String(settings.adminPin || "1234")) return alert("PIN 錯誤。");
      openAdminArea();
    }

    function openAdminArea() {
      adminUnlocked = true;
      $("adminLock").classList.add("hidden");
      $("adminArea").classList.remove("hidden");
      renderAdmin();
    }

    async function saveSettings() {
      settings = Object.assign({}, settings, {
        apiUrl: $("apiUrlInput").value.trim(),
        liffId: $("liffIdInput").value.trim(),
        siteName: $("siteNameInput").value.trim() || "店面",
        latitude: Number($("latInput").value) || DEFAULT_SETTINGS.latitude,
        longitude: Number($("lngInput").value) || DEFAULT_SETTINGS.longitude,
        radiusMeters: Number($("radiusInput").value) || 100,
        adminPin: $("adminPinInput").value.trim() || "1234"
      });
      saveLocalSettings();
      try {
        await apiCall("saveSettings", settings);
        await syncFromSheet();
        alert("設定已儲存。");
      } catch (error) {
        alert(`設定儲存失敗：${error.message}`);
      }
    }

    async function setCurrentLocationAsSite() {
      if (!navigator.geolocation) return alert("不支援定位。");
      navigator.geolocation.getCurrentPosition(position => {
        $("latInput").value = position.coords.latitude.toFixed(6);
        $("lngInput").value = position.coords.longitude.toFixed(6);
      }, error => alert(`定位失敗：${error.message}`), { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
    }

    async function saveEmployee() {
      const payload = {
        lineUserId: $("employeeLineIdInput").value.trim(),
        name: $("employeeNameInput").value.trim(),
        status: "啟用",
        role: $("employeeRoleInput").value || "員工"
      };
      if (!payload.name) return alert("請輸入員工姓名。");
      try {
        await apiCall("saveEmployee", payload);
        $("employeeNameInput").value = "";
        $("employeeLineIdInput").value = "";
        $("employeeRoleInput").value = "員工";
        await syncFromSheet();
        alert("員工已儲存。");
      } catch (error) {
        alert(`員工儲存失敗：${error.message}`);
      }
    }

    async function manualClock() {
      const employee = employees[Number($("manualEmployeeSelect").value || 0)];
      if (!employee) return alert("請先選擇員工。");
      const payload = {
        lineUserId: employee.lineUserId,
        employeeName: employee.name,
        date: $("manualDate").value,
        type: $("manualType").value,
        actualTime: $("manualTime").value,
        source: "管理者補卡",
        locationStatus: "管理者補卡",
        note: $("manualNote").value.trim()
      };
      if (!payload.date || !payload.actualTime) return alert("請填日期與時間。");
      try {
        await apiCall("clock", payload);
        $("manualNote").value = "";
        await syncFromSheet();
        alert("補打卡已新增，工時已重新計算。");
      } catch (error) {
        alert(`補打卡失敗：${error.message}`);
      }
    }

    async function updateLogStatus(logId, status) {
      if (!logId) return alert("這筆舊紀錄沒有紀錄ID，無法取消。請用新版產生的紀錄操作。");
      const label = status === "cancelled" ? "取消納入" : "恢復納入";
      if (!confirm(`確定要${label}這筆打卡？`)) return;
      try {
        await apiCall("updateClockLogStatus", { logId, status });
        await syncFromSheet();
        alert(`已${label}，工時已重新計算。`);
      } catch (error) {
        alert(`操作失敗：${error.message}`);
      }
    }

    async function updateLogTime(logId) {
      if (!logId) return alert("這筆舊紀錄沒有紀錄ID，無法修改。");
      const input = document.querySelector(`[data-log-time="${CSS.escape(logId)}"]`);
      const actualTime = input?.value || "";
      if (!actualTime) return alert("請輸入時間。");
      try {
        const result = await apiCall("updateClockLogTime", { logId, actualTime });
        logs = logs.map(log => log.logId === logId ? Object.assign({}, log, {
          actualTime: result.actualTime,
          roundedTime: result.roundedTime,
          note: log.note.includes("管理者修改時間") ? log.note : [log.note, "管理者修改時間"].filter(Boolean).join("；")
        }) : log);
        saveCachedData();
        renderAdmin();
        alert("打卡時間已修改，工時已重新計算。");
        syncFromSheet();
      } catch (error) {
        alert(`修改時間失敗：${error.message}`);
      }
    }

    async function deleteEmployee(lineUserId) {
      if (!confirm("確定停用這位員工？")) return;
      await apiCall("deleteEmployee", { lineUserId });
      await syncFromSheet();
    }

    async function setEmployeeRole(index, role) {
      const employee = employees[Number(index)];
      if (!employee) return alert("找不到員工。");
      try {
        await apiCall("saveEmployee", { lineUserId: employee.lineUserId, name: employee.name, status: employee.status || "啟用", role });
        await syncFromSheet();
        alert(`${employee.name} 已設為${role}。`);
      } catch (error) {
        alert(`權限設定失敗：${error.message}`);
      }
    }

    async function reviewRequest(requestId, status) {
      const finalTimeInput = document.querySelector(`[data-final-time="${CSS.escape(requestId)}"]`);
      const payload = {
        requestId,
        status,
        finalTime: finalTimeInput ? finalTimeInput.value : ""
      };
      try {
        await apiCall("reviewCorrectionRequest", payload);
        await syncFromSheet();
        alert(status === "approved" ? "已核准並寫入打卡紀錄。" : "已拒絕申請。");
      } catch (error) {
        alert(`審核失敗：${error.message}`);
      }
    }

    function renderAdmin() {
      renderSettings();
      renderTodayDashboard();
      renderEmployeeList();
      renderManualEmployeeSelect();
      renderRequestReviewList();
      renderLogTable();
    }

    function renderSettings() {
      $("apiUrlInput").value = settings.apiUrl || "";
      $("liffIdInput").value = settings.liffId || "";
      $("siteNameInput").value = settings.siteName || "";
      $("radiusInput").value = settings.radiusMeters || 100;
      $("latInput").value = settings.latitude || "";
      $("lngInput").value = settings.longitude || "";
      $("adminPinInput").value = settings.adminPin || "1234";
    }

    function renderEmployeeList() {
      $("employeeList").innerHTML = employees.length ? employees.map((employee, index) => `
        <div class="row">
          <div>
            <strong>${escapeHtml(employee.name)}</strong><br>
            <small>LINE ID：${escapeHtml(employee.lineUserId || "未綁定")}｜${escapeHtml(employee.status)}｜${escapeHtml(effectiveRole(employee))}</small>
          </div>
          <div class="actions">
            <button class="btn ${effectiveRole(employee) === "管理者" ? "ghost" : "blue"}" type="button" data-role-index="${index}" data-role-value="${effectiveRole(employee) === "管理者" ? "員工" : "管理者"}">${effectiveRole(employee) === "管理者" ? "改為員工" : "設為管理者"}</button>
            <button class="btn red" type="button" data-delete-employee="${escapeHtml(employee.lineUserId)}">停用</button>
          </div>
        </div>
      `).join("") : `<div class="empty">尚未建立員工。</div>`;
    }

    function renderManualEmployeeSelect() {
      $("manualEmployeeSelect").innerHTML = employees.length
        ? employees.map((employee, index) => `<option value="${index}">${escapeHtml(employee.name || "(未命名)")}${employee.lineUserId ? "" : "（未綁定）"}</option>`).join("")
        : `<option value="">尚未建立員工</option>`;
    }

    function renderRequestReviewList() {
      const pending = requests.filter(request => request.status === "待審核");
      $("requestReviewList").innerHTML = pending.length ? pending.map(request => `
        <div class="row">
          <div>
            <strong>${escapeHtml(request.name)}｜${escapeHtml(request.date)}｜${escapeHtml(request.type)}</strong><br>
            <small>員工自述：${escapeHtml(request.claimedTime)}｜原因：${escapeHtml(request.reason || "無")}</small>
            <label style="margin-top:8px;">老闆確認最終時間</label>
            <input type="time" value="${escapeHtml(request.claimedTime || "06:30")}" data-final-time="${escapeHtml(request.requestId)}">
          </div>
          <div class="actions">
            <button class="btn primary" type="button" data-approve="${escapeHtml(request.requestId)}">核准</button>
            <button class="btn red" type="button" data-reject="${escapeHtml(request.requestId)}">拒絕</button>
          </div>
        </div>
      `).join("") : `<div class="empty">目前沒有待審核補卡申請。</div>`;
    }

    function renderTodayDashboard() {
      const today = nowParts().date;
      const activeEmployees = employees.filter(employee => employee.status !== "停用");
      const todayLogs = logs.filter(log => log.date === today && log.status !== "取消");
      const rows = activeEmployees.map(employee => {
        const employeeLogs = todayLogs.filter(log => log.lineUserId === employee.lineUserId || (!employee.lineUserId && log.name === employee.name));
        const ins = employeeLogs.filter(log => log.type === "上班").sort((a, b) => a.actualTime.localeCompare(b.actualTime));
        const outs = employeeLogs.filter(log => log.type === "下班").sort((a, b) => a.actualTime.localeCompare(b.actualTime));
        const inTime = ins[0]?.actualTime || "";
        const outTime = outs[outs.length - 1]?.actualTime || "";
        const state = inTime && outTime ? "done" : (inTime ? "working" : "absent");
        const label = state === "done" ? "已下班" : (state === "working" ? "上班中" : "未上班");
        const badge = state === "done" ? "off" : (state === "working" ? "warn" : "bad");
        return { employee, inTime, outTime, state, label, badge };
      });
      $("todayClockInCount").textContent = rows.filter(row => row.inTime).length;
      $("todayWorkingCount").textContent = rows.filter(row => row.state === "working").length;
      $("todayAbsentCount").textContent = rows.filter(row => row.state === "absent").length;
      $("todayDashboard").innerHTML = rows.length ? rows.map(row => `
        <div class="dashboard-row ${row.state}">
          <div>
            <strong>${escapeHtml(row.employee.name || "未命名員工")}</strong>
            <div class="dashboard-times">
              <span>上班：${escapeHtml(row.inTime || "--:--")}</span>
              <span>下班：${escapeHtml(row.outTime || "--:--")}</span>
            </div>
          </div>
          <span class="badge ${row.badge}">${row.label}</span>
        </div>
      `).join("") : `<div class="empty">尚未建立員工。</div>`;
    }

    function renderLogTable() {
      const month = $("logMonthInput").value || nowParts().month;
      const date = $("logDateInput").value;
      const rows = logs.filter(log => date ? log.date === date : log.date.startsWith(month)).sort((a, b) => `${b.date}${b.actualTime}`.localeCompare(`${a.date}${a.actualTime}`));
      $("adminEmployeeCount").textContent = employees.length;
      $("adminLogCount").textContent = rows.length;
      $("adminPendingCount").textContent = requests.filter(request => request.status === "待審核").length;
      $("logTable").innerHTML = rows.length ? rows.map(log => `
        <tr>
          <td>${escapeHtml(log.date)}</td>
          <td>${escapeHtml(log.name)}</td>
          <td>${escapeHtml(log.type)}</td>
          <td><input type="time" value="${escapeHtml(log.actualTime)}" data-log-time="${escapeHtml(log.logId)}"></td>
          <td>${escapeHtml(log.roundedTime)}</td>
          <td><span class="badge ${log.status === "取消" ? "bad" : (log.note.includes("範圍外") ? "warn" : "ok")}">${escapeHtml(log.status === "取消" ? "取消" : (log.note.includes("範圍外") ? "範圍外納入" : "納入"))}</span></td>
          <td>${escapeHtml(log.note)}</td>
          <td>
            <button class="btn blue" type="button" data-log-time-save="${escapeHtml(log.logId)}">儲存時間</button>
            <button class="btn ${log.status === "取消" ? "primary" : "red"}" type="button" data-log-status="${escapeHtml(log.logId)}" data-status="${log.status === "取消" ? "active" : "cancelled"}">${log.status === "取消" ? "恢復納入" : "取消納入"}</button>
          </td>
        </tr>
      `).join("") : `<tr><td colspan="8"><div class="empty">${date ? "這一天" : "這個月"}沒有打卡紀錄。</div></td></tr>`;
    }

    function renderAll() {
      renderEmployeeSelect();
      if (!$("page-admin").classList.contains("hidden") && isCurrentUserAdmin()) openAdminArea();
      if (adminUnlocked) renderAdmin();
      if (!$("page-query").classList.contains("hidden")) refreshSummary();
      if (quickPunchRequested && !$("page-punch").classList.contains("hidden")) openQuickPunchModal();
    }

    function switchPage(page, type) {
      document.querySelectorAll(".page").forEach(section => section.classList.toggle("hidden", section.id !== `page-${page}`));
      document.querySelectorAll(".nav .tab").forEach(tab => {
        const active = tab.dataset.page === page && (!type || tab.dataset.punchType === type);
        tab.classList.toggle("active", active);
      });
      if (page === "punch") {
        punchType = type || punchType || "上班";
        $("heroTitle").textContent = `${punchType}打卡`;
        $("punchTitle").textContent = `${punchType}打卡`;
        $("punchTypeLabel").textContent = punchType;
        locate();
        if (quickPunchRequested) openQuickPunchModal();
      }
      if (page === "query") {
        $("heroTitle").textContent = "當月總工時";
        $("heroText").textContent = "";
        refreshSummary();
      }
      if (page === "admin") {
        $("heroTitle").textContent = "管理端";
        $("heroText").textContent = "";
        if (isCurrentUserAdmin()) openAdminArea();
      }
    }

    function handleLaunchAction() {
      const params = new URLSearchParams(location.search);
      const type = params.get("type");
      const action = params.get("action");
      if (type === "on" || action === "clock-in") {
        quickPunchRequested = true;
        switchPage("punch", "上班");
        openQuickPunchModal();
        return;
      }
      if (type === "off" || action === "clock-out") {
        quickPunchRequested = true;
        switchPage("punch", "下班");
        openQuickPunchModal();
        return;
      }
      if (type === "query") return switchPage("query");
      if (action === "request") {
        switchPage("query");
        $("requestPanel").classList.remove("hidden");
      }
      return switchPage("punch", "上班");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function bindEvents() {
      document.querySelectorAll(".nav .tab").forEach(tab => {
        tab.addEventListener("click", () => switchPage(tab.dataset.page, tab.dataset.punchType));
      });
      $("employeeSelect").addEventListener("change", () => {
        if (!$("page-query").classList.contains("hidden")) refreshSummary();
      });
      $("bindEmployeeBtn").addEventListener("click", bindSelectedEmployee);
      $("statusCloseBtn").addEventListener("click", hideStatusModal);
      $("quickCloseBtn").addEventListener("click", closeQuickPunchModal);
      $("quickConfirmPunchBtn").addEventListener("click", confirmPunch);
      $("confirmPunchBtn").addEventListener("click", confirmPunch);
      $("refreshSummaryBtn").addEventListener("click", refreshSummary);
      $("openRequestBtn").addEventListener("click", () => $("requestPanel").classList.toggle("hidden"));
      $("submitRequestBtn").addEventListener("click", submitCorrectionRequest);
      $("unlockAdminBtn").addEventListener("click", unlockAdmin);
      $("saveSettingsBtn").addEventListener("click", saveSettings);
      $("useCurrentLocationBtn").addEventListener("click", setCurrentLocationAsSite);
      $("saveEmployeeBtn").addEventListener("click", saveEmployee);
      $("manualClockBtn").addEventListener("click", manualClock);
      $("refreshAdminBtn").addEventListener("click", syncFromSheet);
      $("logMonthInput").addEventListener("change", () => {
        $("logDateInput").value = "";
        renderLogTable();
      });
      $("logDateInput").addEventListener("change", renderLogTable);
      $("clearLogDateBtn").addEventListener("click", () => {
        $("logDateInput").value = "";
        renderLogTable();
      });
      $("employeeList").addEventListener("click", event => {
        const button = event.target.closest("[data-delete-employee]");
        if (button) deleteEmployee(button.dataset.deleteEmployee);
        const roleButton = event.target.closest("[data-role-index]");
        if (roleButton) setEmployeeRole(roleButton.dataset.roleIndex, roleButton.dataset.roleValue);
      });
      $("requestReviewList").addEventListener("click", event => {
        const approve = event.target.closest("[data-approve]");
        const reject = event.target.closest("[data-reject]");
        if (approve) reviewRequest(approve.dataset.approve, "approved");
        if (reject) reviewRequest(reject.dataset.reject, "rejected");
      });
      $("logTable").addEventListener("click", event => {
        const timeButton = event.target.closest("[data-log-time-save]");
        if (timeButton) updateLogTime(timeButton.dataset.logTimeSave);
        const button = event.target.closest("[data-log-status]");
        if (button) updateLogStatus(button.dataset.logStatus, button.dataset.status);
      });
    }

    async function init() {
      $("requestDate").value = nowParts().date;
      $("logMonthInput").value = nowParts().month;
      $("logDateInput").value = "";
      $("manualDate").value = nowParts().date;
      bindEvents();
      updateClock();
      setInterval(updateClock, 1000);
      handleLaunchAction();
      Promise.allSettled([initLineProfile(), syncFromSheet()]).then(() => {
        renderAll();
        handleLaunchAction();
      });
    }

    init();
  </script>
</body>
</html>
